server {
    listen 80;
    server_name localhost;
    
    root /usr/share/nginx/html;
    index index.html;
    
    # Отключаем авто-индексацию
    autoindex off;
    
    # Проксирование API запросов на бекенд
    # Все запросы начинающиеся с /auth, /templates, /processes, /tasks, /admin идут на бек
    location ~ ^/(auth|templates|processes|tasks|admin) {
        proxy_pass http://back:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
    
    # Для SPA - все остальные запросы отдаём index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # Статические файлы
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
    
    # Обработка ошибок - перенаправляем на index.html
    error_page 404 /index.html;
}